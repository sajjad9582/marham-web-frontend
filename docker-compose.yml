services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marham-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      TZ: Asia/Karachi
      PORT: 3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
